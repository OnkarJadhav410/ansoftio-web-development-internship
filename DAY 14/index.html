<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f9f9f9; }
        .product { border: 1px solid #ccc; padding: 20px; margin: 30px auto; width: 300px; display: inline-block; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .product img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        button { background-color: #2563EB; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 16px; }
        button:hover { background-color: black; }
    </style>
</head>
<body>
    <div class="product">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKW5ndhwJLQPIZDy8HTCrrk6U6ePXTgwinzQ&s" alt="Product">
        <h2>Beauty Face Wash</h2>
        <p>This is a best face wash for all skin types.</p>
        <p><strong>Price: ₹999</strong></p>
        <button>Buy Now</button>
    </div>
</body> 
</html>
