<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Task</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        button { padding: 10px 20px; font-size: 16px; background: #2563EB; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1 id="heading">Welcome to JavaScript</h1>
    <button onclick="changeText()">Click Me</button>
    <script>
        function changeText() {
            alert('Button Clicked!');
            document.getElementById('heading').innerHTML = 'Hello I am Onkar Jadhav';
            console.log('Button was clicked');
        }
    </script>
</body>
</html>
