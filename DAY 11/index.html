<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Cards</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .card {
            width: 250px;
            padding: 20px;
            background-color: #ffffff;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 14px;
            color: #555;
        }

        button {
            margin-top: 15px;
            background-color: #2563EB;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: black;
        }
    </style>
</head>

<body>

<h1>Flexbox Cards</h1>

<div class="container">

    <div class="card">
        <h3>Card 1</h3>
        <p>This is the first card description.</p>
        <button>Click</button>
    </div>

    <div class="card">
        <h3>Card 2</h3>
        <p>This is the second card description.</p>
        <button>Click</button>
    </div>

    <div class="card">
        <h3>Card 3</h3>
        <p>This is the third card description.</p>
        <button>Click</button>
    </div>

</div>

</body>
</html>
